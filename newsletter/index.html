<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter — Cindy Gravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bubble-green: #4d784f;
        --text-color-dark: #000;
        --menu-text-color: #dcdcdc;
        --font-pixel: "VT323", monospace;
      }

      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
      }
      body {
        margin: 0;
        padding: 0;
        background: var(--bubble-green);
        font-family: var(--font-pixel);
        color: var(--text-color-dark);
        min-height: 100vh;
      }

      .page {
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        padding: 28px 24px 60px 24px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      h1,
      .lead,
      .sub,
      .privacy {
        overflow-wrap: break-word;
        max-width: 100%;
      }

      .wordmark {
        display: block;
        width: 150px;
        align-self: flex-start;
        margin-bottom: 40px;
      }
      .wordmark img {
        width: 100%;
        height: auto;
        display: block;
        /* helles Wordmark auf Grün → dunkel einfärben */
        filter: brightness(0);
      }

      .ant {
        width: 44px;
        height: auto;
        margin-bottom: 18px;
        /* weiße Ameise auf Grün → dunkel */
        filter: brightness(0);
      }

      h1 {
        font-family: var(--font-pixel);
        font-weight: 400;
        font-size: 52px;
        line-height: 1.05;
        margin: 0 0 18px 0;
        text-transform: uppercase;
      }
      h1::after {
        content: "▌";
        animation: cursorBlink 1.1s steps(1) infinite;
      }
      @keyframes cursorBlink {
        50% {
          opacity: 0;
        }
      }

      .lead {
        font-size: 26px;
        line-height: 1.25;
        margin: 0 0 8px 0;
        text-transform: uppercase;
      }
      .sub {
        font-size: 21px;
        line-height: 1.3;
        margin: 0 0 36px 0;
        opacity: 0.85;
        text-transform: uppercase;
      }

      /* --- Kit-Formular-Bereich --- */
      .form-slot {
        width: 100%;
        max-width: 440px;
      }

      /* Kit-Embed-Styling-Overrides: greifen, sobald die Form drin ist.
         Kit rendert .formkit-form — wir ziehen sie in unseren Stil. */
      .form-slot .formkit-form {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        font-family: var(--font-pixel) !important;
      }
      .form-slot .formkit-input {
        font-family: var(--font-pixel) !important;
        font-size: 22px !important;
        background: rgba(255, 255, 255, 0.92) !important;
        border: 2px solid var(--text-color-dark) !important;
        border-radius: 4px !important;
        color: var(--text-color-dark) !important;
        padding: 12px 14px !important;
      }
      .form-slot .formkit-submit {
        font-family: var(--font-pixel) !important;
        font-size: 24px !important;
        text-transform: uppercase !important;
        background: var(--text-color-dark) !important;
        color: var(--bubble-green) !important;
        border: 2px solid var(--text-color-dark) !important;
        border-radius: 4px !important;
        box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.55) !important;
        padding: 12px 28px !important;
        cursor: pointer !important;
      }
      .form-slot .formkit-submit:hover {
        box-shadow: 0px 0px 0px rgba(0, 0, 0, 0.55) !important;
      }
      /* Kit packt eigenes Padding in den Button-Span — neutralisieren,
         sonst doppelt es sich mit unserem Button-Padding */
      .form-slot .formkit-submit > span {
        padding: 0 !important;
        background: none !important;
      }
      /* Luft zwischen den Feldern und vor dem Button */
      .form-slot .formkit-field {
        margin-bottom: 16px !important;
      }
      .form-slot .formkit-submit {
        margin-top: 6px !important;
      }
      .form-slot .formkit-guarantee,
      .form-slot .formkit-powered-by-convertkit-container {
        font-family: var(--font-pixel) !important;
      }
      .form-slot .formkit-powered-by-convertkit-container {
        margin-top: 26px !important;
      }

      .privacy {
        font-size: 17px;
        margin-top: 28px;
        opacity: 0.7;
        text-transform: uppercase;
      }

      .back-link {
        font-family: var(--font-pixel);
        font-size: 20px;
        color: var(--text-color-dark);
        text-transform: uppercase;
        margin-top: 48px;
        display: inline-block;
      }

      /* Embed-Modus (?embed=1): Seite läuft als iframe im Fenster der
         Hauptseite — Wordmark und Back-Link wären dort doppelt/verwirrend */
      body.embedded .wordmark,
      body.embedded .back-link {
        display: none;
      }
      /* Im Fenster blinkt schon der Cursor im Fenstertitel — nicht doppeln */
      body.embedded h1::after {
        content: none;
      }
      body.embedded .page {
        padding-top: 8px;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 40px;
        }
        .lead {
          font-size: 22px;
        }
        .sub {
          font-size: 18px;
        }
        .wordmark {
          width: 120px;
          margin-bottom: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a href="/" class="wordmark">
        <img src="../assets/wordmark.svg" alt="Cindy Gravity" />
      </a>

      <img src="../assets/ant1.svg" alt="" class="ant" />

      </div>

      <p class="privacy">We respect your privacy. Unsubscribe at any time.</p>

      <a href="/" class="back-link">&larr; Back to cindygravity.com</a>
    </div>

    <script>
      // Embed-Modus: als iframe im Fenster der Hauptseite
      const isEmbedded = new URLSearchParams(window.location.search).get("embed") === "1";
      if (isEmbedded) {
        document.body.classList.add("embedded");
      } else {
        // GoatCounter nur im Standalone-Modus laden — im iframe würde jeder
        // Fenster-Öffner auf der Hauptseite doppelt gezählt
        const gc = document.createElement("script");
        gc.async = true;
        gc.src = "https://gc.zgo.at/count.js";
        gc.dataset.goatcounter = "https://cindygravitycounter.goatcounter.com/count";
        document.body.appendChild(gc);
      }
    </script>
  </body>
</html>
