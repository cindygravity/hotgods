<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>May Cindy Be With You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --menu-text-color: #dcdcdc;
        --bubble-green: #4d784f;
        --window-bg-color: #d0c4c0;
        --text-color-dark: #000;
        --on-surface-color: #e9deda;
        --font-mono: "Space Mono", monospace;
        /* VT323: Pixel-Terminal-Font — passt zum Retro-Fenster-Stil.
           Hat nur Schriftschnitt 400, kein Italic/Bold. */
        --font-menu: "VT323", monospace;
        --font-bubble: "VT323", monospace;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        overflow: hidden;
        cursor: none;
        background-color: #1a1a1a;
      }

      /* Custom Cursor (nur Desktop) */
      .custom-cursor {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 9999;
        width: 40px;
        height: 40px;
        background-image: url("assets/tarothand.png");
        background-size: contain;
        background-repeat: no-repeat;
        transition: background-image 0.1s ease-in-out;
      }
      .custom-cursor.hovered {
        background-image: url("assets/tarothand2.png");
      }
      a,
      button {
        cursor: none !important;
      }

      /* Hintergrundbild */
      .background-image {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("assets/BG_new.jpg");
        background-size: cover;
        background-position: center 30%;
        background-repeat: no-repeat;
        z-index: -1;
      }

      /* --- HEADER: Wordmark links, Menü rechts --- */
      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 48px 64px 0 64px;
        box-sizing: border-box;
        z-index: 100;
      }

      .wordmark {
        display: block;
        width: 228px;
        height: auto;
      }
      .wordmark img {
        width: 100%;
        height: auto;
        display: block;
      }

      .main-nav {
        display: flex;
        align-items: center;
        gap: 44px;
        margin-top: 44px;
      }
      .main-nav .menu-item {
        font-family: var(--font-menu);
        font-size: 28px;
        color: var(--menu-text-color);
        text-decoration: none;
        text-transform: uppercase;
        white-space: nowrap;
        transition: opacity 0.2s;
      }
      .main-nav .menu-item:hover {
        opacity: 0.7;
      }

      /* Hamburger (nur Mobile) + Fullscreen-Menü-Overlay.
         Hamburger und Overlay-X sitzen auf exakt derselben Position,
         damit das Öffnen wie eine Verwandlung des Icons wirkt. */
      .hamburger-button {
        display: none;
        position: fixed;
        top: 14px;
        right: 10px;
        background: none;
        border: none;
        padding: 14px;
        z-index: 200;
      }
      .hamburger-button img {
        width: 30px;
        height: auto;
        display: block;
        image-rendering: pixelated;
      }
      .menu-overlay {
        position: fixed;
        inset: 0;
        background: #40739d;
        z-index: 300;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      .menu-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
      .menu-overlay .menu-item {
        font-family: var(--font-menu);
        font-size: 45px;
        color: var(--text-color-dark);
        text-decoration: none;
        text-transform: uppercase;
        padding: 14px 20px;
      }
      /* Identische Position + Größe wie .hamburger-button (Verwandlungs-Effekt) */
      .menu-overlay .close-overlay-btn {
        position: absolute;
        top: 14px;
        right: 10px;
        background: none;
        border: none;
        padding: 14px;
      }
      .menu-overlay .close-overlay-btn img {
        width: 30px;
        height: auto;
        display: block;
        image-rendering: pixelated;
      }

      /* Sound Toggle (Vogel) */
      .sound-toggle {
        background: none;
        border: none;
        padding: 0;
        margin-top: 20px;
        margin-left: 44px;
        position: relative;
        display: flex;
        align-items: center;
      }
      /* Kombiniertes Icon: Vogel + Lautsprecher in einem SVG,
         4 Varianten (an/aus × normal/hover) */
      .sound-toggle .bird-icon {
        width: 81px;
        height: auto;
        display: block;
      }

      /* --- AMEISE + SPRECHBLASE (Haupt-CTA) --- */
      .ant-cta {
        position: fixed;
        bottom: 0;
        left: 0;
        z-index: 90;
        text-decoration: none;
        display: block;
        /* Läuft von links nach rechts und zurück */
        animation: antWalk 60s linear infinite alternate;
      }
      .ant-cta:hover {
        animation-play-state: paused;
      }
      .ant-cta:hover .ant-sprite {
        animation-play-state: paused;
      }

      @keyframes antWalk {
        0% {
          transform: translateX(4vw);
        }
        100% {
          /* 380px Blase + 24px Richtungs-Versatz */
          transform: translateX(calc(96vw - 404px));
        }
      }

      .speech-bubble {
        position: relative;
        width: 380px;
        height: 187px;
        /* Der Zipfel der Blase liegt in der SVG ganz unten links (x≈0) —
           die Ameise läuft direkt darunter. Beim Richtungswechsel dreht
           sich die Ameise nur auf der Stelle; stattdessen rückt die Blase
           etwas, damit der Zipfel über dem Kopf bleibt (JS setzt margin).
           Startwert 24px = "Ameise läuft nach rechts". */
        margin-left: 24px;
        margin-bottom: 10px;
        transition: margin-left 1.6s ease-in-out;
      }
      .speech-bubble .bubble-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .speech-bubble .bubble-text {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: var(--font-bubble);
        font-weight: 400;
        font-size: 25px;
        line-height: 1.15;
        color: var(--text-color-dark);
        text-transform: uppercase;
        padding: 30px 55px 45px 55px;
        box-sizing: border-box;
        transition: opacity 0.2s ease;
      }
      /* Der "New Song?"-Button in der Blase nutzt ebenfalls VT323 */
      .speech-bubble .bubble-button .retro-button {
        font-family: var(--font-bubble);
        font-size: 1.4em;
        padding: 8px 24px;
      }
      /* Hover: Text weicht dem Button */
      .speech-bubble .bubble-button {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-bottom: 15px;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
      }
      /* Hover-Wechsel nur auf Geräten mit echtem Hover (Desktop) —
         auf Touch würde der Button sonst nur kurz aufblitzen */
      @media (hover: hover) {
        .ant-cta:hover .bubble-text {
          opacity: 0;
        }
        .ant-cta:hover .bubble-button {
          opacity: 1;
        }
      }

      .ant-sprite {
        width: 38px;
        height: auto;
        display: block;
        /* Die Ameise bleibt an fester Position und dreht sich nur —
           die Zipfel-Kompensation macht die Blase (siehe oben) */
        margin-left: -8px;
        margin-bottom: 6px;
      }

      /* --- UHR (Retro-Detail, unten rechts) --- */
      .clock-widget {
        position: fixed;
        bottom: 16px;
        right: 20px;
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--menu-text-color);
        z-index: 80;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.85;
        pointer-events: none;
      }

      /* --- FENSTER (zwei Test-Varianten, umschaltbar per ?win=flat|term) ---
         flat = opake Farbflächen im Stil des Menü-Overlays
         term = dunkle Terminal-Fenster */
      .window {
        position: fixed;
        z-index: 150;
        display: none;
        flex-direction: column;
        padding: 0;
        font-family: var(--font-menu);
        text-transform: uppercase;
        overflow: hidden;
      }
      .window.active {
        display: flex;
      }
      .window-inner-content {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        min-height: 0;
      }
      .window-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-sizing: border-box;
      }
      .window-header h2 {
        margin: 0;
        font-weight: 400;
      }
      .close-window-btn {
        background: none;
        border: none;
        padding: 14px;
      }
      .close-window-btn:hover {
        opacity: 0.8;
      }
      .close-window-btn img {
        width: 30px;
        height: auto;
        display: block;
        image-rendering: pixelated;
      }
      .window-content {
        flex-grow: 1;
        overflow-y: auto;
        line-height: 1.4;
      }

      .stream-grid {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
      }
      .stream-link-item {
        font-size: 26px;
        text-decoration: none;
        white-space: nowrap;
        text-align: center;
      }
      .stream-link-item:hover {
        text-decoration: underline;
      }
      /* Die alten Plattform-Icons passen zu keiner der neuen Varianten */
      .stream-link-item .icon {
        display: none;
      }

      /* ===== Variante FLAT: opake Farbflächen, fullscreen ===== */
      body.win-flat .window {
        inset: 0;
        color: var(--text-color-dark);
      }
      body.win-flat #musicWindow {
        background: var(--bubble-green);
      }
      body.win-flat #aboutWindow {
        background: #40739d;
      }
      body.win-flat #newsletterWindow {
        background: var(--bubble-green);
      }
      /* Newsletter-Fenster: die /newsletter/-Seite läuft als iframe darin —
         Inhalt füllt das Fenster, kein Innen-Layout nötig */
      body.win-flat #newsletterWindow .window-content {
        max-width: none;
        padding: 0;
        display: block;
      }
      #newsletterWindow iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      body.win-flat .window-header {
        padding: 24px 70px 0 28px;
      }
      body.win-flat .window-header h2 {
        font-size: 42px;
        color: var(--text-color-dark);
      }
      /* Blinkender Terminal-Cursor hinter dem Fenstertitel */
      body.win-flat .window-header h2::after {
        content: "▌";
        animation: cursorBlink 1.1s steps(1) infinite;
      }
      @keyframes cursorBlink {
        50% {
          opacity: 0;
        }
      }
      body.win-flat .close-window-btn {
        position: absolute;
        top: 14px;
        right: 10px;
      }
      body.win-flat .window-content {
        display: flex;
        flex-direction: column;
        max-width: 560px;
        width: 100%;
        margin: 0 auto;
      }
      /* Vertikal zentrieren via Auto-Margins statt justify-content: center —
         zentriert bei kurzem Inhalt, bleibt aber von oben scrollbar, wenn der
         Inhalt höher als das Fenster ist (sonst wäre der Anfang unerreichbar) */
      body.win-flat .window-content > :first-child {
        margin-top: auto;
      }
      body.win-flat .window-content > :last-child {
        margin-bottom: auto;
      }
      body.win-flat .stream-link-item {
        color: var(--text-color-dark);
      }
      body.win-flat .window-content p {
        font-size: 22px;
        line-height: 1.25;
      }

      /* Retro-Button: Grundstil (u.a. für den "New Song?"-Button in der Blase) */
      .retro-button {
        background-color: var(--on-surface-color);
        color: var(--text-color-dark);
        border: 2px solid var(--text-color-dark);
        border-radius: 4px;
        box-shadow: 2px 2px 0px rgba(0, 0, 0, 1);
        padding: 10px 24px;
        font-family: var(--font-mono);
        font-size: 1em;
        text-transform: uppercase;
        transition: background-color 0.2s, box-shadow 0.2s;
        text-decoration: none;
        display: inline-block;
      }
      .retro-button:hover {
        background-color: #f7f1ef;
        box-shadow: 0px 0px 0px rgba(0, 0, 0, 1);
      }

      /* Order-LP-Sektion im Music-Fenster */
      .order-lp-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 15px 20px 25px 20px;
        border-top: 2px dashed currentColor;
        margin: 10px 20px 0 20px;
        text-align: center;
      }
      .order-lp-section p {
        margin: 0;
        font-size: 20px;
      }

      /* About-Fenster: Textabstände + Footer (Contact/Instagram) */
      #aboutWindow .window-content p {
        margin-left: 20px;
        margin-right: 20px;
        margin-bottom: 15px;
      }
      .about-footer {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 15px 20px 25px 20px;
        border-top: 2px dashed currentColor;
        margin: 5px 20px 0 20px;
        text-align: center;
      }
      .about-footer p {
        margin: 0 !important;
        font-size: 0.85em;
      }
      .about-footer .insta-link {
        color: inherit;
        font-size: 22px;
      }

      /* Buttons & Trennlinien in den Fenstern erben die Variante */
      .window .retro-button {
        background: transparent;
        color: inherit;
        border-color: currentColor;
        font-family: var(--font-menu);
        font-size: 22px;
        box-shadow: 3px 3px 0px currentColor;
      }
      .window .retro-button:hover {
        background: rgba(0, 0, 0, 0.12);
        box-shadow: 0px 0px 0px currentColor;
      }

      /* --- MOBILE --- */
      @media (max-width: 768px) {
        body {
          cursor: auto;
        }
        a,
        button {
          cursor: auto !important;
        }
        .custom-cursor {
          display: none !important;
        }

        /* Mobile: Wordmark links, Hamburger rechts — Navigation im Overlay */
        .site-header {
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
          padding: 20px 24px 0 24px;
        }
        .wordmark {
          width: 130px;
        }
        .main-nav {
          display: none;
        }
        .sound-toggle {
          display: none;
        }
        .hamburger-button {
          display: block;
        }

        /* Blase: Text + Button untereinander (kein Hover auf Touch),
           als Gruppe vertikal zentriert, damit der Button nicht in die
           untere Rundung der Blase rutscht */
        .speech-bubble {
          /* Höhere Mobile-Blase (bubble_mobile.svg, 313x215) */
          width: 320px;
          height: 220px;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }
        /* relative statt absolute: Text+Button stapeln sich im Fluss,
           bleiben aber über dem absolut positionierten Blasen-Bild */
        .speech-bubble .bubble-text {
          position: relative;
          inset: auto;
          z-index: 1;
          font-size: 19px;
          padding: 0 48px;
          margin-top: 6px;
          opacity: 1 !important;
        }
        .speech-bubble .bubble-button {
          position: relative;
          inset: auto;
          z-index: 1;
          opacity: 1;
          padding: 14px 0 0 0;
        }
        .speech-bubble .bubble-button .retro-button {
          font-size: 1.15em;
          padding: 7px 20px;
        }
        /* Ameise + Blase wandern gemeinsam langsam ein Stück vor und
           zurück — langsam genug, um ein bequemes Tap-Ziel zu bleiben.
           Richtungswechsel/Spiegelung übernimmt dieselbe JS-Logik wie
           auf dem Desktop. */
        @keyframes antPaceCta {
          0% {
            transform: translateX(4vw);
          }
          100% {
            transform: translateX(calc(4vw + 36px));
          }
        }
        .ant-cta {
          animation: antPaceCta 8s linear infinite alternate;
        }

        .clock-widget {
          font-size: 11px;
          bottom: 10px;
          right: 12px;
        }

        /* Fenster werden fullscreen — in beiden Varianten */
        .window.active {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          width: auto !important;
          height: auto !important;
          max-height: none !important;
          border: none;
          box-shadow: none;
          border-radius: 0;
          overflow-y: auto;
        }
        body.win-flat .window-header h2 {
          font-size: 32px;
        }
        body.win-flat .window-content {
          padding: 0 24px 32px 24px;
          box-sizing: border-box;
        }
      }

      body.no-scroll {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="customCursor"></div>

    <!-- Hintergrundbild -->
    <div class="background-image"></div>

    <!-- Audio -->
    <audio id="backgroundMusic" loop>
      <source src="assets/birdsong.mp3" type="audio/mpeg" />
    </audio>

    <!-- Header: Wordmark + Menü -->
    <header class="site-header">
      <a href="/" class="wordmark">
        <img src="assets/wordmark.svg" alt="Cindy Gravity" />
      </a>
      <div style="display: flex; align-items: flex-start;">
        <nav class="main-nav" id="mainNav"></nav>
        <button class="sound-toggle" id="soundToggleButton" title="Sound an/aus">
          <img src="assets/icon-sound/sound_off.svg" alt="" class="bird-icon" id="soundStateIcon" />
        </button>
        <button class="hamburger-button" id="hamburgerButton" title="Menü">
          <img src="assets/icon-hamburger/hamburger_open.svg" alt="Menü" />
        </button>
      </div>
    </header>

    <!-- Fullscreen-Menü-Overlay (Mobile) -->
    <div class="menu-overlay" id="menuOverlay">
      <button class="close-overlay-btn" id="closeOverlayButton">
        <img src="assets/icon-hamburger/hamburger_close.svg" alt="Schließen" />
      </button>
      <nav class="overlay-nav" id="overlayNav" style="display: contents;"></nav>
    </div>

    <!-- Ameise + Sprechblase: Haupt-CTA zum Newsletter -->
    <a class="ant-cta" id="antCta" target="_blank" rel="noopener">
      <div class="speech-bubble">
        <picture>
          <source media="(max-width: 768px)" srcset="assets/bubble_mobile.svg" />
          <img src="assets/bubble.svg" alt="" class="bubble-bg" />
        </picture>
        <div class="bubble-text" id="bubbleText"></div>
        <div class="bubble-button">
          <span class="retro-button" id="bubbleButton"></span>
        </div>
      </div>
      <img src="assets/ant1.svg" alt="" class="ant-sprite" id="antSprite" />
    </a>

    <!-- Uhr -->
    <div class="clock-widget" id="clockWidget"></div>

    <!-- Music-Fenster -->
    <div class="window" id="musicWindow">
      <div class="window-inner-content">
        <div class="window-header">
          <h2>Choose Your Poison</h2>
          <button class="close-window-btn">
            <img src="assets/icon-hamburger/hamburger_close.svg" alt="Close" />
          </button>
        </div>
        <div class="window-content">
          <div class="stream-grid" id="streamGrid"></div>
          <div class="order-lp-section" id="orderLpSection"></div>
        </div>
      </div>
    </div>

    <!-- About-Fenster (mit Contact + Instagram) -->
    <div class="window" id="aboutWindow">
      <div class="window-inner-content">
        <div class="window-header">
          <h2>This Is Cindy Gravity</h2>
          <button class="close-window-btn">
            <img src="assets/icon-hamburger/hamburger_close.svg" alt="Close" />
          </button>
        </div>
        <div class="window-content">
          <div id="aboutText"></div>
          <div class="about-footer" id="aboutFooter"></div>
        </div>
      </div>
    </div>

    <!-- Newsletter-Fenster: lädt /newsletter/?embed=1 als iframe (eine Quelle für das Kit-Formular) -->
    <div class="window" id="newsletterWindow">
      <div class="window-inner-content">
        <div class="window-header">
          <h2>Newsletter</h2>
          <button class="close-window-btn">
            <img src="assets/icon-hamburger/hamburger_close.svg" alt="Close" />
          </button>
        </div>
        <div class="window-content">
          <iframe id="newsletterFrame" title="Newsletter signup"></iframe>
        </div>
      </div>
    </div>

    <!-- GoatCounter: privater Besucherzähler (cookiefrei, für Besucher unsichtbar).
         Dashboard: https://cindygravitycounter.goatcounter.com -->
    <script
      data-goatcounter="https://cindygravitycounter.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // --- SITE_CONTENT: einzige Quelle für Links & Inhalte ---
        const SITE_CONTENT = {
          newsletterUrl: "https://cindy-gravity.kit.com/04de44c0ec",
          bubbleTextLines: ["Hello friend!", "would you like to hear an unreleased song?"],
          bubbleButtonLabel: "New Song?",
          navItems: [
            { label: "Music", windowTarget: "musicWindow" },
            { label: "About", windowTarget: "aboutWindow" },
            { label: "Newsletter", windowTarget: "newsletterWindow" },
          ],
          streamLinks: [
            { label: "TIDAL.WAV", href: "https://tidal.com/browse/artist/16507789", icon: "assets/logos/icon_tidal.png", alt: "Tidal" },
            { label: "APPLEMUSIC.M4A", href: "https://music.apple.com/de/artist/cindy-gravity/1475913950?l=en-GB", icon: "assets/logos/icon_apple.png", alt: "Apple Music" },
            { label: "SPOTIFY.MP3", href: "https://open.spotify.com/artist/58f43Z5rRDgEl6jJXjT4or?si=nWs80F7EReSnnygL0JaG-w", icon: "assets/logos/icon_spotify.png", alt: "Spotify" },
            { label: "YOUTUBE.MOV", href: "https://www.youtube.com/watch?v=AoUcpQWgV24", icon: "assets/logos/icon_youtube.png", alt: "YouTube" },
            { label: "BANDCAMP.ZIP", href: "https://cindygravity.bandcamp.com/", icon: "assets/logos/icon_bandcamp.png", alt: "Bandcamp" },
          ],
          orderLp: {
            text: "Want it on wax? The HOT GODS LP — vinyl + digital download.",
            buttonLabel: "Order the LP",
            href: "https://forms.gle/sBiXuLMKDKoyxnHv7",
          },
          aboutParagraphs: [
            "Cindy Gravity is an experimental pop trio that established itself as a boundary-crosser between psychedelic pop, R’n’B, and yacht rock with their debut “Brutally Soft.”",
            "In 2025, Cindy Gravity presents their new album HOT GODS, in which they explore a darker side. The themes revolve around inner demons, spiritual experiences, and ritual magic.",
            "Cindy Gravity has further developed, condensed, and refined their sound. With an eclectic arsenal of drum machines, breakbeats, Japanese synthesizers and surf guitars, the trio sings three-voiced harmonies on pop songs about the synchronicity of the universe.",
          ],
          contactEmail: "hello@cindygravity.com",
          instagramUrl: "https://www.instagram.com/cindy__gravity/",
        };

        // Fenster-Stil: opake Farbflächen ("flat").
        // Weitere getestete Varianten (term/crt/tcol/glass) liegen in der Git-History.
        document.body.classList.add("win-flat");

        // --- Rendering aus SITE_CONTENT ---
        function navItemsHtml() {
          return SITE_CONTENT.navItems
            .map((item) => {
              if (item.hrefKey || item.href) {
                const url = item.href || SITE_CONTENT[item.hrefKey];
                return `<a href="${url}" target="_blank" rel="noopener" class="menu-item">${item.label}</a>`;
              }
              return `<a href="#" class="menu-item" data-window-target="${item.windowTarget}">${item.label}</a>`;
            })
            .join("");
        }
        document.getElementById("mainNav").innerHTML = navItemsHtml();
        document.getElementById("overlayNav").innerHTML = navItemsHtml();

        document.getElementById("streamGrid").innerHTML = SITE_CONTENT.streamLinks
          .map(
            (l) =>
              `<a href="${l.href}" target="_blank" rel="noopener" class="stream-link-item"><img src="${l.icon}" alt="${l.alt}" class="icon" />${l.label}</a>`,
          )
          .join("");

        document.getElementById("orderLpSection").innerHTML =
          `<p>${SITE_CONTENT.orderLp.text}</p><a href="${SITE_CONTENT.orderLp.href}" target="_blank" rel="noopener" class="retro-button">${SITE_CONTENT.orderLp.buttonLabel}</a>`;

        document.getElementById("aboutText").innerHTML = SITE_CONTENT.aboutParagraphs
          .map((p) => `<p>${p}</p>`)
          .join("");

        document.getElementById("aboutFooter").innerHTML =
          `<p>Say hello:</p><a href="mailto:${SITE_CONTENT.contactEmail}" class="retro-button">${SITE_CONTENT.contactEmail.toUpperCase()}</a><a href="${SITE_CONTENT.instagramUrl}" target="_blank" rel="noopener" class="insta-link">→ INSTAGRAM</a>`;

        const antCta = document.getElementById("antCta");
        // Klick öffnet das Newsletter-Fenster; href bleibt als Fallback
        // (Rechtsklick/neuer Tab führt zur Standalone-Landingpage)
        antCta.href = "/newsletter/";
        antCta.removeAttribute("target");
        antCta.addEventListener("click", (e) => {
          e.preventDefault();
          openWindow("newsletterWindow");
        });
        document.getElementById("bubbleText").innerHTML = SITE_CONTENT.bubbleTextLines
          .map((line) => `<span>${line}</span>`)
          .join("");
        document.getElementById("bubbleButton").textContent = SITE_CONTENT.bubbleButtonLabel;

        // --- Custom Cursor ---
        const customCursor = document.getElementById("customCursor");
        const mobileMediaQuery = window.matchMedia("(max-width: 768px)");
        if (customCursor) {
          document.addEventListener("mousemove", (e) => {
            if (!mobileMediaQuery.matches) {
              customCursor.style.left = `${e.clientX}px`;
              customCursor.style.top = `${e.clientY}px`;
            }
          });
          document.querySelectorAll("a, button").forEach((el) => {
            el.addEventListener("mouseenter", () => {
              if (!mobileMediaQuery.matches) customCursor.classList.add("hovered");
            });
            el.addEventListener("mouseleave", () => {
              if (!mobileMediaQuery.matches) customCursor.classList.remove("hovered");
            });
          });
        }

        // --- Hamburger-Overlay (Mobile) ---
        const menuOverlay = document.getElementById("menuOverlay");
        document.getElementById("hamburgerButton").addEventListener("click", () => {
          menuOverlay.classList.add("active");
        });
        document.getElementById("closeOverlayButton").addEventListener("click", () => {
          menuOverlay.classList.remove("active");
        });
        // Jeder Link-Klick im Overlay schließt es (auch externe wie Newsletter)
        document.querySelectorAll("#overlayNav a").forEach((a) => {
          a.addEventListener("click", () => menuOverlay.classList.remove("active"));
        });

        // --- Fenster-Logik ---
        function openWindow(id) {
          const target = document.getElementById(id);
          if (!target) return;
          // Newsletter-iframe erst beim ersten Öffnen laden (spart Kit-Script beim Seitenstart)
          if (id === "newsletterWindow") {
            const frame = document.getElementById("newsletterFrame");
            if (!frame.src) frame.src = "/newsletter/?embed=1";
          }
          target.classList.add("active");
          menuOverlay.classList.remove("active"); // Overlay schließen, falls offen
        }
        document.querySelectorAll("[data-window-target]").forEach((trigger) => {
          trigger.addEventListener("click", (e) => {
            e.preventDefault();
            openWindow(trigger.dataset.windowTarget);
          });
        });
        document.querySelectorAll(".close-window-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            btn.closest(".window").classList.remove("active");
          });
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            document.querySelectorAll(".window.active").forEach((w) => w.classList.remove("active"));
            menuOverlay.classList.remove("active");
          }
        });

        // --- Sound Toggle (Vogel) ---
        const soundToggleButton = document.getElementById("soundToggleButton");
        const backgroundMusic = document.getElementById("backgroundMusic");
        if (soundToggleButton && backgroundMusic) {
          backgroundMusic.volume = 0.3;
          // Default: aus. Browser blockieren Autoplay ohnehin — so stimmt
          // das Icon immer mit der Realität überein.
          let isMuted = true;
          const soundStateIcon = document.getElementById("soundStateIcon");
          let soundHovered = false;
          function updateSoundIcon() {
            const state = isMuted ? "off" : "on";
            const hover = soundHovered ? "_hover" : "";
            soundStateIcon.src = `assets/icon-sound/sound_${state}${hover}.svg`;
          }
          soundToggleButton.addEventListener("click", (e) => {
            e.stopPropagation();
            isMuted = !isMuted;
            updateSoundIcon();
            if (isMuted) {
              backgroundMusic.pause();
            } else {
              backgroundMusic.play().catch(() => {});
            }
          });
          soundToggleButton.addEventListener("mouseenter", () => {
            soundHovered = true;
            updateSoundIcon();
          });
          soundToggleButton.addEventListener("mouseleave", () => {
            soundHovered = false;
            updateSoundIcon();
          });
        }

        // --- Ameisen-Schritt-Animation (2 Frames im Wechsel) ---
        const antSprite = document.getElementById("antSprite");
        const antImages = ["assets/ant1.svg", "assets/ant2.svg"];
        let antFrame = 0;
        let antPaused = false;
        antCta.addEventListener("mouseenter", () => (antPaused = true));
        antCta.addEventListener("mouseleave", () => (antPaused = false));
        setInterval(() => {
          if (!antPaused) {
            antFrame = (antFrame + 1) % antImages.length;
            antSprite.src = antImages[antFrame];
          }
        }, 150);

        // --- Laufrichtung: Die Lauf-Animation ist "alternate", der Browser
        //     feuert am Wendepunkt ein animationiteration-Event — exakt dort
        //     dreht sich die Ameise auf der Stelle um und die Blase rückt nach,
        //     damit der Zipfel über dem Kopf bleibt ---
        const speechBubble = document.querySelector(".speech-bubble");
        let movingLeft = false; // Animation startet nach rechts laufend
        antCta.addEventListener("animationiteration", () => {
          movingLeft = !movingLeft;
          antSprite.style.transform = movingLeft ? "scaleX(-1)" : "scaleX(1)";
          speechBubble.style.marginLeft = movingLeft ? "0px" : "24px";
        });

        // --- Uhr ---
        const clockWidget = document.getElementById("clockWidget");
        const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
        function updateClock() {
          const now = new Date();
          const pad = (n) => String(n).padStart(2, "0");
          clockWidget.textContent = `${days[now.getDay()]} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }
        updateClock();
        setInterval(updateClock, 1000);
      });
    </script>
  </body>
</html>
