<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>404 — Cindy Gravity</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0d0a09" />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <style>
    :root {
      --carbon: #0d0a09; --cream: #e7dcc3;
      --mono: "SF Mono", ui-monospace, SFMono-Regular, Menlo, "JetBrains Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; max-width: 100%; overflow-x: hidden; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 6px; padding: 40px 22px;
      background: var(--carbon);
      background-image: repeating-linear-gradient(0deg, rgba(231,220,195,0.035) 0 1px, transparent 1px 3px);
      color: var(--cream); font-family: var(--mono); letter-spacing: 0.03em;
    }
    .ant { width: 52px; height: auto; margin-bottom: 12px; }
    h1 { font-weight: 400; font-size: 46px; letter-spacing: 0.08em; margin-bottom: 6px; }
    p { font-size: 14px; line-height: 1.7; opacity: 0.85; }
    .cursor { display: inline-block; animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    a {
      margin-top: 24px; font: inherit; font-size: 13px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--carbon); background: var(--cream);
      border: 1px solid var(--cream); padding: 12px 22px; text-decoration: none;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    }
    a:hover { box-shadow: 0 0 0 rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <img class="ant" src="/assets/ant/ant1.svg" alt="" />
  <h1>404</h1>
  <p>&gt; signal lost. this page drifted off into space.<span class="cursor">▮</span></p>
  <a href="/">← back to cindygravity.com</a>
</body>
</html>
